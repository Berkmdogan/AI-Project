version: "3.9"

services:
  # ── gRPC Video Analiz Servisi ──────────────────────────────────────────────
  grpc_service:
    build:
      context: .
      dockerfile: docker/Dockerfile.grpc
    container_name: video_grpc
    env_file: .env
    environment:
      - GRPC_HOST=0.0.0.0
      - GRPC_PORT=50051
    ports:
      - "50051:50051"
    volumes:
      - video_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import grpc; ch=grpc.insecure_channel('localhost:50051'); import video_analysis_pb2_grpc as s; stub=s.VideoAnalysisServiceStub(ch)"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── FastAPI REST API ───────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: video_api
    env_file: .env
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - GRPC_HOST=grpc_service
      - GRPC_PORT=50051
    ports:
      - "8000:8000"
    volumes:
      - video_data:/app/data
    depends_on:
      - grpc_service
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  video_data:
    driver: local
