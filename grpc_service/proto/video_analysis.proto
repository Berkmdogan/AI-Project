syntax = "proto3";

package video_analysis;

// ── Frame gönderme ──────────────────────────────────────────────────────────

message VideoFrame {
  string frame_id    = 1;
  bytes  image_data  = 2;   // JPEG encoded
  int64  timestamp   = 3;   // Unix ms
  string source_id   = 4;   // camera / file id
}

message AnalysisResult {
  string frame_id              = 1;
  int64  timestamp             = 2;
  repeated Detection detections = 3;
  string event_description     = 4;   // "09:15 - Kırmızı araç tespit edildi"
  bool   frame_saved           = 5;
  string frame_path            = 6;
}

message Detection {
  string label      = 1;
  float  confidence = 2;
  BBox   bbox       = 3;
  string color_hint = 4;   // dominant colour in bounding box
}

message BBox {
  float x1 = 1;
  float y1 = 2;
  float x2 = 3;
  float y2 = 4;
}

// ── Batch gönderme ──────────────────────────────────────────────────────────

message BatchFrameRequest {
  repeated VideoFrame frames = 1;
}

message BatchAnalysisResponse {
  repeated AnalysisResult results = 1;
  int32 processed_count           = 2;
  int32 error_count               = 3;
}

// ── Stream ──────────────────────────────────────────────────────────────────

message StreamStatus {
  string source_id   = 1;
  bool   is_active   = 2;
  int64  frame_count = 3;
  string message     = 4;
}

// ── Sağlık kontrolü ─────────────────────────────────────────────────────────

message HealthRequest  {}
message HealthResponse { string status = 1; string version = 2; }

// ── Servis tanımı ───────────────────────────────────────────────────────────

service VideoAnalysisService {
  // Tek kare analizi
  rpc AnalyzeFrame(VideoFrame) returns (AnalysisResult);

  // Toplu kare analizi
  rpc AnalyzeBatch(BatchFrameRequest) returns (BatchAnalysisResponse);

  // İstemci→sunucu akışı: sürekli kare gönder, sonuç al
  rpc StreamAnalysis(stream VideoFrame) returns (stream AnalysisResult);

  // Sağlık kontrolü
  rpc HealthCheck(HealthRequest) returns (HealthResponse);
}
